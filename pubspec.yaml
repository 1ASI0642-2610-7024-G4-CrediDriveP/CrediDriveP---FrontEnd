name: credidrivep
description: Sistema de gestión de créditos vehiculares - CrediDriveP
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5

  # DI
  get_it: ^7.6.7

  # HTTP & API
  dio: ^5.4.0

  # Local Storage (JWT)
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Navigation
  go_router: ^13.0.1

  # Functional programming (Either)
  dartz: ^0.10.1

  # Utils
  intl: ^0.19.0
  jwt_decoder: ^2.0.1

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
